version: "1.0"
environment: whatsapp_sales_rl

tasks:
  task1:
    id: task1
    display_name: "Easy Sale"
    description: >
      A warm, receptive customer who is already interested in the product.
      The agent must confirm needs, present value clearly, and close efficiently.
    difficulty: easy
    max_steps: 15
    initial_state:
      trust_range: [0.5, 0.7]
      patience_range: [0.75, 0.95]
      satisfaction_range: [0.4, 0.6]
      conversion_prob_range: [0.4, 0.6]
    user_type_weights:
      IMPULSIVE: 0.25
      ANALYTICAL: 0.25
      SKEPTICAL: 0.15
      LOYAL: 0.10
      PRICE_SENSITIVE: 0.25
    reward_weights: {}
    tags: [beginner, warm_lead, short_episode]

  task2:
    id: task2
    display_name: "Balanced Negotiation"
    description: >
      A moderate customer with mixed signals — shows interest but raises
      objections and price concerns. The agent must qualify needs, handle
      objections skillfully, and negotiate to close.
    difficulty: medium
    max_steps: 20
    initial_state:
      trust_range: [0.4, 0.6]
      patience_range: [0.6, 0.9]
      satisfaction_range: [0.4, 0.6]
      conversion_prob_range: [0.3, 0.5]
    user_type_weights:
      IMPULSIVE: 0.25
      ANALYTICAL: 0.25
      SKEPTICAL: 0.15
      LOYAL: 0.10
      PRICE_SENSITIVE: 0.25
    reward_weights: {}
    tags: [intermediate, mixed_signals, negotiation]

  task3:
    id: task3
    display_name: "Hard Close"
    description: >
      A skeptical, analytical customer who is hard to convince and quick to
      abandon the conversation. The agent must build trust patiently, resolve
      deep objections, and avoid any missteps that increase annoyance.
    difficulty: hard
    max_steps: 25
    initial_state:
      trust_range: [0.2, 0.45]
      patience_range: [0.4, 0.65]
      satisfaction_range: [0.4, 0.6]
      conversion_prob_range: [0.15, 0.35]
    user_type_weights:
      IMPULSIVE: 0.10
      ANALYTICAL: 0.30
      SKEPTICAL: 0.35
      LOYAL: 0.05
      PRICE_SENSITIVE: 0.20
    reward_weights: {}
    tags: [advanced, skeptical_lead, long_episode, trust_building]

metadata:
  author: "Dev A"
  created: "2025-01-01"
  description: >
    OpenEnv task suite for WhatsApp sales-agent RL training.
    Three difficulty levels covering the full spectrum of customer personas.